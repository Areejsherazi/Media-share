name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test SSH Connection
      run: |
        echo "Testing SSH connection to ${{ secrets.EC2_HOST }}"
        echo "Username: ${{ secrets.EC2_USERNAME }}"
        
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 300s
        script: |
          echo "Successfully connected to EC2!"
          whoami
          pwd
          ls -la
          
          # Create app directory if it doesn't exist
          mkdir -p /home/${{ secrets.EC2_USERNAME }}/app
          cd /home/${{ secrets.EC2_USERNAME }}/app
          
          # Clone or update repository (using GitHub token for private repo)
          if [ ! -d ".git" ]; then
            git config --global credential.helper '!echo username=${{ secrets.GIT_USERNAME }}; echo password=${{ secrets.GITHUB_TOKEN }}; echo'
            git clone https://github.com/Areejsherazi/Media-share.git .
          else
            git config --global credential.helper '!echo username=${{ secrets.GIT_USERNAME }}; echo password=${{ secrets.GITHUB_TOKEN }}; echo'
            git pull origin main
          fi
          
          # Stop existing containers
          docker-compose down || true
          
          # Build and start with Docker Compose
          docker-compose up -d --build
          
          # Wait for services to be healthy
          sleep 30
          
          # Check if services are running
          docker-compose ps
          
          # Show logs for debugging
          docker-compose logs app
