      - JWT_SECRET=a28ed930779360b93862ea522ade5fd329733448692f5d1198d5fcaaccae57554b61aa9a6beaa0540318e85d2afdc778510671a217192fe157b6a4553e5c49ba
      - JWT_EXPIRES_IN=7d
