  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - photo-sharing-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  photo-sharing-network:
    driver: bridge
